name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Rename binary
        run: mv target/release/photobooth-bridge target/release/photobooth-bridge-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: target/release/photobooth-bridge-linux-x86_64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman

      - name: Build via build-windows.sh
        run: ./build-windows.sh

      - name: Rename binary
        run: mv target-windows/x86_64-pc-windows-gnu/release/photobooth-bridge.exe target-windows/x86_64-pc-windows-gnu/release/photobooth-bridge-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: target-windows/x86_64-pc-windows-gnu/release/photobooth-bridge-windows-x86_64.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist

      - name: Make Linux binary executable
        run: chmod +x dist/photobooth-bridge-linux-x86_64

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/photobooth-bridge-linux-x86_64
            dist/photobooth-bridge-windows-x86_64.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
